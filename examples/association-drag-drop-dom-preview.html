<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BHE Association Drag-Drop DOM Preview</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1f2933;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .preview-note {
        margin: 0 0 24px;
        color: #5f6b7a;
      }

      .bhe-association-drag-drop {
        padding: 22px;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 8px 20px rgb(31 41 51 / 8%);
      }

      .bhe-association-drag-drop__workspace {
        display: grid;
        gap: 18px;
      }

      .bhe-association-drag-drop__tray,
      .bhe-association-drag-drop__zone-items {
        min-height: 58px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px;
        border: 1px dashed #9aa8b7;
        border-radius: 8px;
        background: #f8fafc;
      }

      .bhe-association-drag-drop__zones {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }

      .bhe-association-drag-drop__zone {
        padding: 14px;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        background: #ffffff;
      }

      .bhe-association-drag-drop__zone h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .bhe-association-drag-drop__zone.is-correct {
        border-color: #1f8a4c;
        background: #f0fbf4;
      }

      .bhe-association-drag-drop__zone.is-incorrect {
        border-color: #c2413a;
        background: #fff5f4;
      }

      .bhe-association-drag-drop__item {
        padding: 8px 10px;
        border: 1px solid #b8c4d1;
        border-radius: 8px;
        background: #ffffff;
        color: inherit;
        cursor: grab;
        font: inherit;
      }

      .bhe-association-drag-drop__item:active {
        cursor: grabbing;
      }

      .bhe-association-drag-drop__zone-details {
        min-height: 20px;
        margin: 10px 0 0;
        font-size: 13px;
        color: #5f6b7a;
      }

      .bhe-association-drag-drop__check {
        margin-top: 18px;
        padding: 10px 14px;
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      .bhe-association-drag-drop__feedback {
        margin-top: 18px;
      }

      .bhe-feedback {
        display: grid;
        gap: 10px;
      }

      .bhe-feedback__message {
        padding: 10px 12px;
        border: 1px solid #d7dee8;
        border-left-width: 5px;
        border-radius: 8px;
        background: #fbfcfe;
      }

      .bhe-feedback__summary {
        font-weight: 700;
      }

      .bhe-feedback__message-text {
        margin: 0;
      }

      .bhe-feedback--success {
        border-left-color: #1f8a4c;
      }

      .bhe-feedback--info {
        border-left-color: #2563eb;
      }

      .bhe-feedback--warning {
        border-left-color: #b26a00;
      }

      .bhe-feedback--error {
        border-left-color: #c2413a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BHE Association Drag-Drop DOM Preview</h1>
      <p class="preview-note">
        Temporary native DOM prototype. Drag items into zones, then click Check.
      </p>
      <div id="app"></div>
    </main>

    <script type="module">
      import { associationDragDropDomRenderer } from "../dist/packages/renderer/renderers/associationDragDropDomRenderer.js";

      const associationSet = {
        kind: "pedagogical-object",
        pedagogicalFamily: "structural",
        pedagogicalType: "association",
        interactionModes: ["drag-drop"],
        metadata: {
          id: "association-drag-drop-dom",
          title: "Association Drag-Drop DOM",
          language: "en"
        },
        learningGoal: {
          domain: "languages",
          skill: "vocabulary",
          topic: "personality adjectives"
        },
        content: {
          core: {
            entries: [
              { id: "kind-text", label: "kind", unit: { id: "unit-kind", kind: "text", text: "kind" } },
              { id: "gentle-text", label: "gentle", unit: { id: "unit-gentle", kind: "text", text: "gentle" } },
              { id: "curious-text", label: "curious", unit: { id: "unit-curious", kind: "text", text: "curious" } },
              {
                id: "curious-image",
                kind: "image",
                unit: {
                  id: "unit-curious-image",
                  kind: "image",
                  src: "assets/images/curious-student.png",
                  alt: "a curious student"
                }
              },
              { id: "creative-text", label: "creative", unit: { id: "unit-creative", kind: "text", text: "creative" } },
              {
                id: "creative-image",
                kind: "image",
                unit: {
                  id: "unit-creative-image",
                  kind: "image",
                  src: "assets/images/creative-person.png",
                  alt: "a creative person"
                }
              },
              {
                id: "creative-audio",
                kind: "audio",
                unit: {
                  id: "unit-creative-audio",
                  kind: "audio",
                  src: "assets/audio/creative.mp3",
                  transcript: "creative"
                }
              }
            ],
            associations: [
              {
                id: "text-to-text-zone",
                entryIds: ["kind-text", "gentle-text"],
                feedback: "Group the two related text adjectives."
              },
              {
                id: "text-to-image-zone",
                entryIds: ["curious-text", "curious-image"],
                feedback: "Group the adjective with its image."
              },
              {
                id: "text-image-audio-zone",
                entryIds: ["creative-text", "creative-image", "creative-audio"],
                feedback: "Group the word, image, and audio."
              }
            ]
          }
        },
        validate() {
          return true;
        }
      };

      document
        .getElementById("app")
        .append(associationDragDropDomRenderer.renderDom(associationSet));
    </script>
  </body>
</html>
