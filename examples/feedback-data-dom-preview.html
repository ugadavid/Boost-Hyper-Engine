<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BHE FeedbackData DOM Preview</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1f2933;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .preview-note {
        margin: 0 0 24px;
        color: #5f6b7a;
      }

      #app {
        display: grid;
        gap: 18px;
      }

      .bhe-feedback {
        padding: 20px;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 8px 20px rgb(31 41 51 / 8%);
      }

      .bhe-feedback__summary {
        margin-bottom: 12px;
        border-width: 2px;
      }

      .bhe-feedback__messages {
        display: grid;
        gap: 10px;
      }

      .bhe-feedback__message {
        padding: 12px 14px;
        border: 1px solid #d7dee8;
        border-left-width: 5px;
        border-radius: 8px;
        background: #fbfcfe;
      }

      .bhe-feedback__message-title,
      .bhe-feedback__message-text {
        margin: 0;
      }

      .bhe-feedback__message-title {
        margin-bottom: 4px;
        font-size: 16px;
      }

      .bhe-feedback--success {
        border-left-color: #1f8a4c;
      }

      .bhe-feedback--info {
        border-left-color: #2563eb;
      }

      .bhe-feedback--warning {
        border-left-color: #b26a00;
      }

      .bhe-feedback--error {
        border-left-color: #c2413a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BHE FeedbackData DOM Preview</h1>
      <p class="preview-note">
        Temporary standalone preview. This renders FeedbackData only, without a pedagogical renderer.
      </p>
      <div id="app"></div>
    </main>

    <script type="module">
      import { renderFeedbackData } from "../dist/packages/renderer/feedback/feedbackDataDomRenderer.js";

      const successFeedback = {
        status: "success",
        summary: {
          id: "success-summary",
          severity: "success",
          title: "QCM",
          message: "Correct."
        }
      };

      const partialFeedback = {
        status: "partial",
        summary: {
          id: "partial-summary",
          severity: "warning",
          title: "Gap-fill",
          message: "Partially correct."
        },
        messages: [
          {
            id: "blank-food-feedback",
            severity: "success",
            message: "Correct.",
            targetId: "blank-food"
          },
          {
            id: "blank-drink-feedback",
            severity: "error",
            message: "Try again.",
            targetId: "blank-drink"
          }
        ]
      };

      document
        .getElementById("app")
        .append(
          renderFeedbackData(successFeedback),
          renderFeedbackData(partialFeedback)
        );
    </script>
  </body>
</html>
